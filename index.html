<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales & Revenue Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:20px;
}
h1{text-align:center;}
.container{
display:flex;
gap:20px;
justify-content:center;
margin:20px;
}
.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}
canvas{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>
<body>

<h1>Sales & Revenue Analysis Dashboard</h1>

<div class="container">
<div class="card">
<h3>Total Sales</h3>
<h2>₹50,000</h2>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h2>₹75,000</h2>
</div>

<div class="card">
<h3>Top Product</h3>
<h2>Laptop</h2>
</div>
</div>

<canvas id="salesChart"></canvas>

<script>
const ctx=document.getElementById('salesChart');

new Chart(ctx,{
type:'bar',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Revenue',
data:[12000,15000,18000,14000,22000,25000]
}]
}
});
</script>

</body>
</html>
